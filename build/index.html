<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ethiopis restaurant</title>
    <link rel="icon" href="/favicon.png">
    <link rel="stylesheet" href="../src/output.css">
</head>
<body class="bg-white ">

    <!-- header -->
    <header class=" sticky  top-0.5 bg-gray-200 flex justify-center align-center rounded-4xl mt-3 mx-6 mb-7 h-10 w-305 gap-150 text-">

        <!-- logo -->
        <div >
            <a href="#home">
                <img src="./assets/logo.png" alt="Ethiopis Restaurant Logo" class=" animate-pulse h-8 w-8 rounded-full pt-2">
            </a>
            

        </div>
        <!-- navigation -->
        <nav class="flex" >
            <ul class="flex font-bold  space-x-20 items-center">
                <li class="border-y-2 border-gray-200 hover:border-cyan-500 duration-900 ">
                    <a href="#home">Home</a>
                </li>
                <li class="border-y-2 border-gray-200 hover:border-cyan-500 duration-900 ">
                    <a href="#menu">Menu</a>
                </li>
                <li class="border-y-2 border-gray-200 hover:border-cyan-500 duration-900 ">
                    <a href="#story">Our Story</a>
                </li>
                <li class="border-y-2 border-gray-200 hover:border-cyan-500 duration-900 ">
                    <a href="#feadbackform">Feedback Form </a>
                </li>
            </ul>
            <!-- light mode -->
            <div class="flex space-x-1.5">
                &nbsp; &nbsp; &nbsp;<img src="./assets/lightbulb.png" alt="light mode" class="space-x-1.5 h-8 w-8 pt-2 cursor-pointer">
            </div>
        </nav>
    </header>
    <!-- hero section -->
    
    <section id="home" class="w-305 h-screen bg-cover bg-center flex flex-col items-center justify-center text-center mx-6 rounded-4xl" style="background-image: url('./assets/hero1.jpg')">
    
        <h1 class="text-white text-8xl font-bold mb-7 drop-shadow-lg">Ethiopis Restaurant</h1>
        
        <button class="bg-white text-black rounded-xl px-4 py-1 hover:bg-transparent border hover:border-black border-transparent hover:text-white animate-bounce transition cursor-pointer">

          <a href="#menu">Explore Our Menu</a>
        </button>
    
        <!-- Arrow Container -->
        <div class="flex items-center justify-between w-full px-10 mt-5">
            
            <img src="./assets/left-arrow.png" alt="Left Arrow" id="left-arrow" class="h-8 w-8 cursor-pointer hover:scale-110 transition">
            
            <img src="./assets/right-arrow.png" alt="Right Arrow" id="right-arrow" class="h-8 w-8 cursor-pointer hover:scale-110 transition">
    
        </div>
        <div id="scrolls" class="grid gap-1 grid-cols-3 grid-rows-1 absolute top-150 ">
            <button class="h-2 w-2 rounded-full  m-10 border-1 bg-transparent cursor-pointer"></button>
            <button class="h-2 w-2 rounded-full m-10  bg-white cursor-pointer"></button>
            <button class="h-2 w-2 rounded-full m-10 border-1 bg-transparent cursor-pointer"></button>
        </div>
    
    </section>



    


   
</body>
</html>
